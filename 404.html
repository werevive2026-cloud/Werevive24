<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>WeRevive</title>
    <script>
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      var redirectUrl = window.location.origin + '/?redirect=' + encodeURIComponent(path + search + hash);
      window.location.replace(redirectUrl);
    </script>
  </head>
  <body></body>
</html>
